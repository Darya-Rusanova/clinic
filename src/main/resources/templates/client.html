<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет - Профи Care</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/client.css">
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <a href="/" class="logo">Профи <span>Care</span></a>
    <nav>
      <ul class="nav-menu">
        <li><a href="/">Главная</a></li>
        <li><a href="/#services">Услуги</a></li>
        <li><a href="/#doctors">Врачи</a></li>
        <li><a href="/#about">О нас</a></li>
        <li class="user-menu" id="userMenu">
                    <span class="user-name" id="userNameBtn">
                        <i class="fas fa-user-circle" th:text="${client.user.firstName} + ' ' + ${client.user.lastName}" ></i> <i class="fas fa-chevron-down"></i>
                    </span>
          <div class="user-dropdown" id="userDropdown">
            <a href="#" id="settingsBtn"><i class="fas fa-cog"></i> Настройки профиля</a>
            <a href="/logout"><i class="fas fa-sign-out-alt"></i> Выйти</a>
          </div>
        </li>
      </ul>
    </nav>
  </div>
</header>

<main class="dashboard">
  <div class="dashboard-container">
    <aside class="profile-sidebar">
      <div class="profile-card">
        <div class="profile-avatar">
          <i class="fas fa-user-circle"></i>
        </div>
        <h3 class="profile-name" id="profileName" th:text="${client.user.firstName} + ' ' + ${client.user.lastName}"></h3>
        <p class="profile-patronymic" id="profilePatronymic" th:text="${client.user.patronymic}"></p>

        <div class="profile-details">
          <div class="profile-detail">
            <i class="fas fa-calendar-alt"></i>
            <span id="profileBirthdate" th:text="${client.birthDate}"></span>
          </div>
          <div class="profile-detail" >
            <i class="fas fa-venus" th:if="${client.user.gender}"></i>
            <i class="fas fa-mars" th:unless="${client.user.gender}"></i>
            <span id="profileGender" th:text="${client.user.gender} ? 'Женский' : 'Мужской'"></span>
          </div>
          <div class="profile-detail">
            <i class="fas fa-phone"></i>
            <span id="profilePhone" th:text="${client.user.phone}"></span>
          </div>
          <div class="profile-detail">
            <i class="fas fa-envelope"></i>
            <span id="profileEmail" th:text="${client.user.email}">Нет почты</span>
          </div>
        </div>

        <button class="profile-edit-btn" id="settingsBtnSidebar">
          <i class="fas fa-pen"></i> Редактировать профиль
        </button>
      </div>
    </aside>

    <!-- Правая колонка - записи -->
    <div class="appointments-content">
      <div class="appointments-header">
        <h2 class="section-title">Мои записи</h2>
        <a th:href="@{/booking}" class="btn-new-appointment">
          <i class="fas fa-plus"></i> Записаться на процедуру
        </a>
      </div>

      <div class="status-tabs">
        <button class="status-tab active" data-filter="all">Все (<span id="allCount">0</span>)</button>
        <button class="status-tab" data-filter="SCHEDULED">Предстоящие (<span id="scheduledCount">0</span>)</button>
        <button class="status-tab" data-filter="COMPLETED">Завершённые (<span id="completedCount">0</span>)</button>
        <button class="status-tab" data-filter="CANCELLED">Отменённые (<span id="cancelledCount">0</span>)</button>
      </div>

      <div id="appointmentsContainer" class="appointments-list">
        <div class="loading">Загрузка...</div>
      </div>
    </div>
  </div>
</main>

<!-- Модальное окно подтверждения отмены -->
<div id="confirmModal" class="modal">
  <div class="modal-content modal-small">
    <div class="modal-header">
      <h3>Подтверждение отмены</h3>
      <span class="close-modal close-confirm-modal">&times;</span>
    </div>
    <div class="modal-body">
      <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #F44336; margin-bottom: 1rem; display: block; text-align: center;"></i>
      <p style="text-align: center; margin-bottom: 1.5rem;">Вы уверены, что хотите отменить запись?</p>
      <p style="text-align: center; color: #A08B7E; font-size: 0.85rem;">Это действие нельзя отменить.</p>
    </div>
    <div class="form-buttons" style="justify-content: center;">
      <button type="button" class="btn-cancel close-confirm-modal">Нет, вернуться</button>
      <button type="button" id="confirmCancelBtn" class="btn-save" style="background: #F44336;">Да, отменить</button>
    </div>
  </div>
</div>

<!-- Модальное окно настроек профиля -->
<div id="settingsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Настройки профиля</h3>
      <span class="close-modal">&times;</span>
    </div>

    <form id="profileForm">
      <div class="form-row">
        <div class="form-group">
          <label>Фамилия</label>
          <input type="text" id="lastName" th:value="${client.user.lastName}">
        </div>
        <div class="form-group">
          <label>Имя</label>
          <input type="text" id="firstName" th:value="${client.user.firstName}">
        </div>
        <div class="form-group">
          <label>Отчество</label>
          <input type="text" id="patronymic" th:value="${client.user.patronymic}">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Дата рождения</label>
          <input type="date" id="birthdate" th:value="${client.birthDate}">
        </div>
        <div class="form-group">
          <label>Пол</label>
          <select id="gender" th:field="${client.user.gender}">
            <option th:value="true">Женский</option>
            <option th:value="false">Мужской</option>
          </select>
        </div>
        <div class="form-group">
          <label>Телефон</label>
          <input type="tel" id="phone" th:value="${client.user.phone}">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" th:value="${client.user.email}">
        </div>
        <div class="form-group">
          <label> </label>
          <div style="visibility: hidden;">placeholder</div>
        </div>
      </div>

      <div class="form-buttons">
        <button type="button" class="btn-cancel" id="cancelBtn">Отмена</button>
        <button type="submit" class="btn-save">Сохранить изменения</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/client.js"></script>
</body>
</html>
