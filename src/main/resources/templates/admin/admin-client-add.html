<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Добавление клиента - Панель администратора</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <a href="/admin" class="logo">Профи <span>Care</span> <span class="admin-badge">Админ</span></a>
    <nav>
      <ul class="nav-menu">
        <li><a href="/admin/clients" class="active">Клиенты</a></li>
        <li><a href="/admin/services">Услуги</a></li>
        <li><a href="/admin/categories">Категории</a></li>
        <li><a href="/admin/doctors">Врачи</a></li>
        <li><a href="/admin/reports">Отчеты</a></li>
        <li class="user-menu" id="userMenu">
          <a href="/logout"><i class="fas fa-sign-out-alt"></i> Выйти</a>
        </li>
      </ul>
    </nav>
  </div>
</header>

<main class="dashboard">
  <div class="dashboard-container">
    <div class="full-content">
      <div class="section-title">
        <h2>Добавление клиента</h2>
        <a href="/admin/clients" class="btn-back"><i class="fas fa-arrow-left"></i> Назад к списку</a>
      </div>

      <div class="form-container">
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form method="post" action="/admin/clients/add" class="admin-form">
          <div class="form-row">
            <div class="form-group">
              <label>Фамилия *</label>
              <input type="text" name="lastName" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Имя *</label>
              <input type="text" name="firstName" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Отчество</label>
              <input type="text" name="patronymic" class="form-control">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Телефон *</label>
              <input type="tel" name="phone" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Email *</label>
              <input type="email" name="email" class="form-control" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Пароль *</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Подтверждение пароля *</label>
              <input type="password" name="confirmPassword" class="form-control" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Дата рождения</label>
              <input type="date" name="birthDate" class="form-control">
            </div>
            <div class="form-group">
              <label>Пол</label>
              <select name="gender" class="form-control">
                <option value="true">Женский</option>
                <option value="false">Мужской</option>
              </select>
            </div>
          </div>

          <div class="form-buttons">
            <a href="/admin/clients" class="btn-cancel">Отмена</a>
            <button type="submit" class="btn-save">Добавить клиента</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>

<script src="/js/admin.js"></script>
</body>
</html>
