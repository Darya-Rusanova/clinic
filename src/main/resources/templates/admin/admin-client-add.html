<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Добавление клиента - Панель администратора</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<header class="header">
  <div class="container">
    <a href="/admin" class="logo">Профи <span>Care</span> <span class="admin-badge">Админ</span></a>
    <nav>
      <ul class="nav-menu">
        <li><a href="/admin">Главная</a></li>
        <li><a href="/admin/clients" class="active">Клиенты</a></li>
        <li><a href="/admin/services">Услуги</a></li>
        <li><a href="/admin/categories">Категории</a></li>
        <li><a href="/admin/doctors">Врачи</a></li>
        <li><a href="/admin/reports">Отчеты</a></li>
        <li><a href="/logout"><i class="fas fa-sign-out-alt"></i> Выйти</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="dashboard">
  <div class="dashboard-container">
    <div class="full-content">
      <div class="section-title">
        <h2>Добавление клиента</h2>
        <a href="/admin/clients" class="btn-back"><i class="fas fa-arrow-left"></i> Назад</a>
      </div>

      <div class="form-container narrow">
        <form id="clientForm" method="post" th:action="@{/admin/clients/add}" th:object="${registrationDto}">
          <div class="form-row">
            <div class="form-group">
              <label>Фамилия *</label>
              <input type="text" th:field="*{lastName}" class="form-control">
              <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="error-message"></span>
            </div>
            <div class="form-group">
              <label>Имя *</label>
              <input type="text" th:field="*{firstName}" class="form-control">
              <span th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="error-message"></span>
            </div>
            <div class="form-group">
              <label>Отчество</label>
              <input type="text" th:field="*{patronymic}" class="form-control">
              <span th:if="${#fields.hasErrors('patronymic')}" th:errors="*{patronymic}" class="error-message"></span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Телефон *</label>
              <input type="tel" th:field="*{phone}" class="form-control">
              <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="error-message"></span>
            </div>
            <div class="form-group">
              <label>Email *</label>
              <input type="email" th:field="*{email}" class="form-control">
              <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message"></span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Пароль *</label>
              <input type="password" th:field="*{password}" class="form-control">
              <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-message"></span>
            </div>
            <div class="form-group">
              <label>Подтверждение пароля *</label>
              <input type="password" th:field="*{confirmPassword}" class="form-control">
              <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="error-message"></span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Дата рождения</label>
              <input type="date" th:field="*{birthDate}" class="form-control">
              <span th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}" class="error-message"></span>
            </div>
            <div class="form-group">
              <label>Пол</label>
              <select th:field="*{gender}" class="form-control">
                <option th:value="true">Женский</option>
                <option th:value="false">Мужской</option>
              </select>
              <span th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}" class="error-message"></span>
            </div>
          </div>

          <div class="form-buttons">
            <a href="/admin/clients" class="btn-cancel">Отмена</a>
            <button type="submit" class="btn-save">Добавить клиента</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>

<script src="/js/admin.js"></script>

</body>
</html>
