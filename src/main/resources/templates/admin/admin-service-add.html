<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${service != null ? 'Редактирование услуги' : 'Добавление услуги'}">Услуги - Панель администратора</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <a href="/admin" class="logo">Профи <span>Care</span> <span class="admin-badge">Админ</span></a>
    <nav>
      <ul class="nav-menu">
        <li><a href="/admin/clients">Клиенты</a></li>
        <li><a href="/admin/services" class="active">Услуги</a></li>
        <li><a href="/admin/categories">Категории</a></li>
        <li><a href="/admin/doctors">Врачи</a></li>
        <li class="user-menu" id="userMenu">
          <a href="/logout"><i class="fas fa-sign-out-alt"></i> Выйти</a>
        </li>
      </ul>
    </nav>
  </div>
</header>

<main class="dashboard">
  <div class="dashboard-container">
    <div class="full-content">
      <div class="section-title">
        <h2 th:text="${service != null ? 'Редактирование услуги' : 'Добавление услуги'}"></h2>
        <a href="/admin/services" class="btn-back"><i class="fas fa-arrow-left"></i> Назад к списку</a>
      </div>

      <div class="form-container">
        <form method="post" th:action="${service != null ? '/admin/services/edit/' + service.id : '/admin/services/add'}"
              class="admin-form" id="serviceForm" enctype="multipart/form-data">

          <input type="hidden" name="serviceId" th:value="${service != null ? service.id : ''}">

          <div class="form-row">
            <div class="form-group">
              <label>Название услуги *</label>
              <input type="text" name="name" class="form-control" th:value="${service != null ? service.name : ''}" required>
            </div>
            <div class="form-group">
              <label>Категория</label>
              <select name="categoryId" class="form-control">
                <option value="">-- Без категории --</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                        th:selected="${service != null && service.category != null && service.category.id == cat.id}"></option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Длительность (минуты) *</label>
              <input type="number" name="duration" class="form-control" th:value="${service != null ? service.duration : ''}" required min="15" step="15">
            </div>
            <div class="form-group">
              <label>Цена (₽) *</label>
              <input type="number" name="price" class="form-control" th:value="${service != null ? service.price : ''}" required min="0" step="100">
            </div>
          </div>

          <div class="form-group">
            <label>Описание</label>
            <textarea name="description" class="form-control" rows="4" th:text="${service != null ? service.description : ''}"></textarea>
          </div>

          <!-- Загрузка изображения -->
          <div class="form-group">
            <label>Изображение услуги</label>
            <div class="image-upload-area" id="imageUploadArea">
              <input type="hidden" name="imagePath" id="imagePath" th:value="${service != null ? service.path : ''}">

              <div id="imagePreview" class="image-preview" th:if="${service != null and service.path != null and service.path != ''}">
                <img th:src="${service.path}" alt="Preview">
                <button type="button" class="remove-image" onclick="removeImage()"><i class="fas fa-times"></i></button>
              </div>

              <div id="uploadPlaceholder" class="upload-placeholder"
                   th:if="${service == null or service.path == null or service.path == ''}"
                   onclick="document.getElementById('imageFile').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Нажмите или перетащите изображение</p>
                <span class="upload-hint">PNG, JPG, JPEG до 5MB</span>
              </div>

              <input type="file" id="imageFile" accept="image/*" style="display: none">
            </div>
          </div>

          <!-- Выбор врачей -->
          <div class="form-group">
            <label>Врачи, оказывающие услугу</label>
            <div class="doctors-grid-cards" id="doctorsGrid">
              <div th:each="doc : ${doctors}" class="doctor-card-select"
                   th:data-doctor-id="${doc.userId}"
                   th:classappend="${selectedDoctorIds != null and selectedDoctorIds.contains(doc.userId)} ? 'selected' : ''">
                <div class="doctor-avatar-small">
                  <img th:src="${doc.imagePath != null ? doc.imagePath : '/images/default-doctor.jpg'}" alt="avatar">
                </div>
                <div class="doctor-info-small">
                  <strong th:text="${doc.user.name}"></strong>
                  <span th:text="${doc.user.patronymic}"></span>
                  <span class="doctor-experience-small" th:text="'Стаж: ' + ${doc.experienceYears} + ' лет'"></span>
                </div>
                <div class="doctor-check">
                  <i class="far fa-square" th:style="${selectedDoctorIds != null and selectedDoctorIds.contains(doc.userId)} ? 'display:none' : ''"></i>
                  <i class="fas fa-check-square" th:style="${selectedDoctorIds != null and selectedDoctorIds.contains(doc.userId)} ? '' : 'display:none'"></i>
                </div>
              </div>
            </div>
            <input type="hidden" name="doctorIds" id="selectedDoctorIds">
          </div>

          <div class="form-buttons">
            <a href="/admin/services" class="btn-cancel">Отмена</a>
            <button type="submit" class="btn-save">Сохранить</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>

<script>
  // Выбор врачей
  const doctorCards = document.querySelectorAll('.doctor-card-select');
  const selectedDoctorIdsSet = new Set();
  const doctorIdsInput = document.getElementById('selectedDoctorIds');

  doctorCards.forEach(card => {
      const doctorId = card.getAttribute('data-doctor-id');
      if (card.classList.contains('selected')) {
          selectedDoctorIdsSet.add(doctorId);
      }
  });
  doctorIdsInput.value = Array.from(selectedDoctorIdsSet).join(',');

  doctorCards.forEach(card => {
      card.addEventListener('click', () => {
          const doctorId = card.getAttribute('data-doctor-id');
          const squareIcon = card.querySelector('.fa-square');
          const checkIcon = card.querySelector('.fa-check-square');

          if (selectedDoctorIdsSet.has(doctorId)) {
              selectedDoctorIdsSet.delete(doctorId);
              card.classList.remove('selected');
              squareIcon.style.display = 'block';
              checkIcon.style.display = 'none';
          } else {
              selectedDoctorIdsSet.add(doctorId);
              card.classList.add('selected');
              squareIcon.style.display = 'none';
              checkIcon.style.display = 'block';
          }

          doctorIdsInput.value = Array.from(selectedDoctorIdsSet).join(',');
      });
  });
// Загрузка изображения
const imageFileInput = document.getElementById('imageFile');
const imagePathInput = document.getElementById('imagePath');

if (imageFileInput) {
    imageFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        const placeholder = document.getElementById('uploadPlaceholder');
        if (placeholder) {
            placeholder.innerHTML = '<i class="fas fa-spinner fa-pulse"></i><p>Загрузка...</p>';
        }

        fetch('/admin/api/upload-image', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                imagePathInput.value = data.url;

                const oldPlaceholder = document.getElementById('uploadPlaceholder');
                if (oldPlaceholder) oldPlaceholder.remove();

                const oldPreview = document.getElementById('imagePreview');
                if (oldPreview) oldPreview.remove();

                const imageUploadArea = document.getElementById('imageUploadArea');
                const newPreview = document.createElement('div');
                newPreview.id = 'imagePreview';
                newPreview.className = 'image-preview';
                newPreview.innerHTML = `
                    <img src="${data.url}" alt="Preview">
                    <button type="button" class="remove-image" onclick="removeImage()"><i class="fas fa-times"></i></button>
                `;
                imageUploadArea.appendChild(newPreview);
            } else {
                alert('Ошибка загрузки');
                location.reload();
            }
        })
        .catch(error => {
            console.error('Ошибка:', error);
            alert('Ошибка загрузки');
            location.reload();
        });
    });
}

window.removeImage = function() {
    const imagePathInput = document.getElementById('imagePath');
    imagePathInput.value = '';

    const preview = document.getElementById('imagePreview');
    if (preview) preview.remove();


    const imageUploadArea = document.getElementById('imageUploadArea');
    const newPlaceholder = document.createElement('div');
    newPlaceholder.id = 'uploadPlaceholder';
    newPlaceholder.className = 'upload-placeholder';
    newPlaceholder.onclick = () => document.getElementById('imageFile').click();
    newPlaceholder.innerHTML = '<i class="fas fa-cloud-upload-alt"></i><p>Нажмите или перетащите изображение</p><span class="upload-hint">PNG, JPG, JPEG до 5MB</span>';
    imageUploadArea.appendChild(newPlaceholder);

    window.uploadPlaceholder = newPlaceholder;
};

</script>

<script src="/js/admin.js"></script>
</body>
</html>
