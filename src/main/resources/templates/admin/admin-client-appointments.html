<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Записи клиента - Панель администратора</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<header class="header" id="header">
    <div class="container">
        <a href="/admin" class="logo">Профи <span>Care</span> <span class="admin-badge">Админ</span></a>
        <nav>
            <ul class="nav-menu">
                <li><a href="/admin">Главная</a></li>
                <li><a href="/admin/clients" class="active">Клиенты</a></li>
                <li><a href="/admin/services">Услуги</a></li>
                <li><a href="/admin/categories">Категории</a></li>
                <li><a href="/admin/doctors">Врачи</a></li>
                <li><a href="/admin/reports">Отчеты</a></li>
                <li class="user-menu" id="userMenu">
                    <a href="/logout"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                </li>
            </ul>
        </nav>
    </div>
</header>

<main class="dashboard">
    <div class="dashboard-container">
        <div class="full-content">
            <div class="section-title">
                <h2>Записи клиента: <span id="clientName">Загрузка...</span></h2>
                <a href="/admin/clients" class="btn-back"><i class="fas fa-arrow-left"></i> Назад к клиентам</a>
            </div>

            <div class="filters-bar">
                <select id="statusFilter" class="filter-select">
                    <option value="all">Все записи</option>
                    <option value="SCHEDULED">Предстоящие</option>
                    <option value="COMPLETED">Завершённые</option>
                    <option value="CANCELLED">Отменённые</option>
                </select>
                <a th:href="@{/booking(clientId=${clientId})}" class="btn-add" style="margin-left: auto; cursor: pointer;">
                    <i class="fas fa-plus"></i> Записать клиента
                </a>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Дата и время</th>
                        <th>Услуга</th>
                        <th>Врач</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody id="appointmentsTableBody">
                    <tr><td colspan="5" style="text-align: center">Загрузка...<\/td></tr>
                    </tbody>
                </table>
            </div>
            <div id="paginationContainer" class="pagination"></div>
        </div>
    </div>
</main>

<div id="cancelModal" class="modal">
    <div class="modal-content modal-small">
        <div class="modal-header">
            <h3>Подтверждение отмены</h3>
            <span class="close-modal close-cancel-modal">&times;</span>
        </div>
        <div class="modal-body">
            <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #F44336; margin-bottom: 1rem; display: block; text-align: center;"></i>
            <p style="text-align: center;">Вы уверены, что хотите отменить запись?</p>
        </div>
        <div class="form-buttons" style="justify-content: center;">
            <button type="button" class="btn-cancel close-cancel-modal">Нет</button>
            <button type="button" id="confirmCancelBtn" class="btn-save" style="background: #F44336;">Да, отменить</button>
        </div>
    </div>
</div>

<script src="/js/admin.js"></script>
<script src="/js/admin-client-appointments.js"></script>
</body>
</html>
