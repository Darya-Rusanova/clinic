<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Все записи - Панель администратора</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="/css/admin-appointments.css">
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <a href="/admin" class="logo">Профи <span>Care</span> <span class="admin-badge">Админ</span></a>
    <nav>
      <ul class="nav-menu">
        <li><a href="/admin">Главная</a></li>
        <li><a href="/admin/clients">Клиенты</a></li>
        <li><a href="/admin/services">Услуги</a></li>
        <li><a href="/admin/categories">Категории</a></li>
        <li><a href="/admin/doctors">Врачи</a></li>
        <li><a href="/admin/appointments">Записи</a></li>
        <li><a href="/admin/reports">Отчеты</a></li>
        <li class="user-menu" id="userMenu">
          <a href="/logout"><i class="fas fa-sign-out-alt"></i> Выйти</a>
        </li>
      </ul>
    </nav>
  </div>
</header>

<main class="dashboard">
  <div class="dashboard-container">
    <div class="full-content">
      <div class="section-title">
        <h2>Все записи</h2>
      </div>

      <div class="filters-bar">
        <div class="filter-group">
          <label>Статус:</label>
          <select id="statusFilter" class="filter-select">
            <option value="all">Все</option>
            <option value="SCHEDULED">Предстоящие</option>
            <option value="COMPLETED">Завершённые</option>
            <option value="CANCELLED">Отменённые</option>
          </select>
        </div>
      </div>

      <div class="sorting-bar">
        <span class="sort-label">Сортировать по:</span>
        <button class="sort-btn" data-sort="dateTime">Дате <i class="fas fa-arrow-down sort-icon"></i></button>
        <button class="sort-btn" data-sort="clientName">Клиенту <i class="fas fa-sort sort-icon"></i></button>
        <button class="sort-btn" data-sort="doctorName">Врачу <i class="fas fa-sort sort-icon"></i></button>
      </div>

      <div class="table-container">
        <table class="data-table">
          <thead>
          <tr>
            <th>Дата и время</th>
            <th>Клиент</th>
            <th>Услуга</th>
            <th>Врач</th>
            <th>Статус</th>
          </tr>
          </thead>
          <tbody id="appointmentsBody">
          <tr><td colspan="5" style="text-align: center">Загрузка...<\/td></tr>
          </tbody>
        </table>
      </div>

      <div id="paginationContainer" class="pagination"></div>
    </div>
  </div>
</main>

<script src="/js/admin-appointments.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
