<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Услуги - Панель администратора</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <a href="/admin" class="logo">Профи <span>Care</span> <span class="admin-badge">Админ</span></a>
    <nav>
      <ul class="nav-menu">
        <li><a href="/admin">Главная</a></li>
        <li><a href="/admin/clients">Клиенты</a></li>
        <li><a href="/admin/services" class="active">Услуги</a></li>
        <li><a href="/admin/categories">Категории</a></li>
        <li><a href="/admin/doctors">Врачи</a></li>
        <li><a href="/admin/appointments">Записи</a></li>
        <li><a href="/admin/reports">Отчеты</a></li>
        <li class="user-menu" id="userMenu">
          <a href="/logout"><i class="fas fa-sign-out-alt"></i> Выйти</a>
        </li>
      </ul>
    </nav>
  </div>
</header>

<main class="dashboard">
  <div class="dashboard-container">
    <div class="full-content">
      <div class="section-title">
        <h2>Услуги</h2>
        <a href="/admin/services/add" class="btn-add"><i class="fas fa-plus"></i> Добавить услугу</a>
      </div>

      <div class="filters-bar">
        <select id="categoryFilter" class="filter-select">
          <option value="">Все категории</option>
          <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
        </select>
      </div>

      <div class="table-container">
        <table class="data-table">
          <thead>
          <tr>
            <th>Услуга</th>
            <th>Категория</th>
            <th>Длительность</th>
            <th>Цена</th>
            <th>Врачей</th>
            <th>Действия</th>
          </tr>
          </thead>
          <tbody id="servicesTableBody">
          <tr><td colspan="6" style="text-align: center">Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div id="deleteModal" class="modal">
  <div class="modal-content modal-small">
    <div class="modal-header">
      <h3>Подтверждение удаления</h3>
      <span class="close-modal close-delete-modal">&times;</span>
    </div>
    <div class="modal-body">
      <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #F44336; margin-bottom: 1rem; display: block; text-align: center;"></i>
      <p style="text-align: center; margin-bottom: 1rem;">Вы уверены, что хотите удалить услугу <strong id="deleteServiceName"></strong>?</p>
      <p style="text-align: center; color: #A08B7E; font-size: 0.85rem;">Это действие нельзя отменить.</p>
    </div>
    <div class="form-buttons" style="justify-content: center;">
      <button type="button" class="btn-cancel close-delete-modal">Отмена</button>
      <button type="button" id="confirmDeleteBtn" class="btn-save" style="background: #F44336;">Удалить</button>
    </div>
  </div>
</div>

<script src="/js/admin-service.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
