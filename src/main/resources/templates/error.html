<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ошибка - Профи Care</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/error.css">
</head>
<body>
<div class="error-container">
  <div class="error-icon">
    <i class="fas fa-bug"></i>
  </div>
  <h1 class="error-title">Произошла ошибка</h1>
  <p class="error-message" th:text="${error} ?: 'Извините, произошла непредвиденная ошибка.'"></p>
  <div class="error-details" th:if="${timestamp}">
    <i class="fas fa-clock"></i> Время: <span th:text="${timestamp}"></span><br>
    <i class="fas fa-link"></i> Путь: <span th:text="${path}"></span><br>
    <i class="fas fa-code-branch"></i> Статус: <span th:text="${status}"></span>
  </div>
  <div class="buttons">
    <a href="/" class="btn btn-primary">
      <i class="fas fa-home"></i> На главную
    </a>
    <a href="javascript:history.back()" class="btn btn-secondary">
      <i class="fas fa-arrow-left"></i> Вернуться
    </a>
  </div>
</div>
</body>
</html>
