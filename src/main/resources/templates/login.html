<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - Профи Care</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <h1>Вход в систему</h1>

    <div th:if="${param.error}" class="alert alert-error">
      <i class="fas fa-exclamation-circle"></i> Неверный email или пароль
    </div>

    <div th:if="${param.logout}" class="alert alert-success">
      <i class="fas fa-check-circle"></i> Вы успешно вышли из системы
    </div>

    <form method="post" action="/login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="username" class="form-control" required autofocus>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn-login">Войти</button>
    </form>

    <p class="register-link">
      Нет аккаунта? <a href="/register">Зарегистрироваться</a>
    </p>
  </div>
</div>
</body>
</html>
