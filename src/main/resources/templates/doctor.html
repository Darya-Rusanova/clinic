<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет врача - Профи Care</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/doctor.css">
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <a href="/doctor" class="logo">Профи <span>Care</span></a>
    <nav>
      <ul class="nav-menu">
        <li><a href="#" id="servicesLink">Услуги</a></li>
        <li><a href="#" id="scheduleLink">Расписание</a></li>
        <li><a href="#" id="clientsLink">Клиенты</a></li>
        <li class="user-menu" id="userMenu">
                    <span class="user-name" id="userNameBtn">
                        <i class="fas fa-user-md"></i> <span th:text="${doctor.user.firstName} + ' ' + ${doctor.user.lastName}"></span> <i class="fas fa-chevron-down"></i>
                    </span>
          <div class="user-dropdown" id="userDropdown">
            <a href="#" id="settingsBtn"><i class="fas fa-cog"></i> Настройки профиля</a>
            <a href="/"><i class="fas fa-sign-out-alt"></i> Выйти</a>
          </div>
        </li>
      </ul>
    </nav>
  </div>
</header>

<main class="dashboard">
  <div class="dashboard-container">
    <aside class="profile-sidebar">
      <div class="profile-card">
        <div class="profile-avatar">
          <i class="fas fa-user-md"></i>
        </div>
        <h3 class="profile-name" th:text="${doctor.user.firstName} + ' ' + ${doctor.user.lastName}"></h3>
        <p class="profile-specialization" th:text="${doctor.user.patronymic}"></p>

        <div class="profile-details">
          <div class="profile-detail">
            <i th:if="${doctor.user.gender}" class="fas fa-venus"></i>
            <i th:unless="${doctor.user.gender}" class="fas fa-mars"></i>
            <span th:text="${doctor.user.gender} ? 'Женский' : 'Мужской'"></span>
          </div>
          <div class="profile-detail">
            <i class="fas fa-phone"></i>
            <span th:text="${doctor.user.phone}"></span>
          </div>
          <div class="profile-detail">
            <i class="fas fa-envelope"></i>
            <span th:text="${doctor.user.email}">Нет почты</span>
          </div>
          <div class="profile-detail">
            <i class="fas fa-stethoscope"></i>
            <span th:text="'Стаж: ' + ${doctor.experienceYears} + ' лет'"></span>
          </div>
        </div>

        <button class="profile-edit-btn" id="settingsBtnSidebar">
          <i class="fas fa-pen"></i> Редактировать профиль
        </button>
      </div>
    </aside>

    <div class="main-content">
      <div id="servicesSection" class="content-section active">
        <th:block th:replace="~{doctor-fragments :: services}"></th:block>
      </div>
      <div id="scheduleSection" class="content-section">
        <th:block th:replace="~{doctor-fragments :: schedule}"></th:block>
      </div>
      <div id="clientsSection" class="content-section">
        <th:block th:replace="~{doctor-fragments :: clients}"></th:block>
      </div>
    </div>
  </div>
</main>

<div id="settingsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Настройки профиля</h3>
      <span class="close-modal">&times;</span>
    </div>
    <form id="profileForm">
      <div class="form-row">
        <div class="form-group">
          <label>Фамилия</label>
          <input type="text" id="lastName" th:value="${doctor.user.lastName}">
        </div>
        <div class="form-group">
          <label>Имя</label>
          <input type="text" id="firstName" th:value="${doctor.user.firstName}">
        </div>
        <div class="form-group">
          <label>Отчество</label>
          <input type="text" id="patronymic" th:value="${doctor.user.patronymic}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Телефон</label>
          <input type="tel" id="phone" th:value="${doctor.user.phone}">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" th:value="${doctor.user.email}">
        </div>
        <div class="form-group">
          <label>Опыт (лет)</label>
          <input type="number" id="experience" th:value="${doctor.experienceYears}">
        </div>
      </div>
      <div class="form-group">
        <label>Пол</label>
        <select id="gender">
          <option th:value="true" th:selected="${doctor.user.gender}">Женский</option>
          <option th:value="false" th:selected="${!doctor.user.gender}">Мужской</option>
        </select>
      </div>
      <div class="form-buttons">
        <button type="button" class="btn-cancel" id="cancelBtn">Отмена</button>
        <button type="submit" class="btn-save">Сохранить изменения</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/doctor.js"></script>
</body>
</html>
