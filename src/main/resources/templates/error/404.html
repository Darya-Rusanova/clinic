<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена - Профи Care</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFF5F0 0%, #FFE8E0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-container {
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #D3836B;
            text-shadow: 4px 4px 0 #FFE0D6;
            margin-bottom: 1rem;
        }

        .error-icon {
            font-size: 5rem;
            color: #D3836B;
            margin-bottom: 1rem;
        }

        .error-title {
            font-size: 1.8rem;
            color: #2C1810;
            margin-bottom: 1rem;
        }

        .error-message {
            color: #A08B7E;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #D3836B;
            color: white;
        }

        .btn-primary:hover {
            background: #C07058;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: #D3836B;
            border: 1px solid #D3836B;
        }

        .btn-secondary:hover {
            background: #FFF2EC;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.4rem; }
            .btn { padding: 0.6rem 1.2rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon">
        <i class="fas fa-compass"></i>
    </div>
    <div class="error-code">404</div>
    <h1 class="error-title">Страница не найдена</h1>
    <p class="error-message">Извините, страница, которую вы ищете, не существует или была перемещена.</p>
    <div class="buttons">
        <a href="/" class="btn btn-primary">
            <i class="fas fa-home"></i> На главную
        </a>
        <a href="javascript:history.back()" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Вернуться назад
        </a>
    </div>
</div>
</body>
</html>
