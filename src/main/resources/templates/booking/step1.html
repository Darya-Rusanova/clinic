<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Запись на процедуру - Шаг 1</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/booking.css">
</head>
<body>
<div class="booking-container">
  <div class="booking-progress">
    <div class="step active">1. Выбор услуги</div>
    <div class="step">2. Выбор времени</div>
    <div class="step">3. Подтверждение</div>
  </div>

  <div class="booking-form">
    <h2>Выберите услугу</h2>

    <div class="filters">
      <select id="categoryFilter">
        <option value="">Все категории</option>
        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
      </select>

      <select id="doctorFilter">
        <option value="">Все врачи</option>
        <option th:each="doc : ${doctors}" th:value="${doc.userId}" th:text="${doc.user.name}"></option>
      </select>
    </div>

    <div id="servicesList" class="services-grid"></div>

    <div class="navigation">
      <button id="nextBtn" class="btn-next" disabled>Далее →</button>
    </div>
  </div>
</div>
<input type="hidden" id="preSelectedServiceId" th:value="${preSelectedServiceId}">
<input type="hidden" id="preSelectedDoctorId" th:value="${preSelectedDoctorId}">
<input type="hidden" id="preSelectedClientId" th:value="${preSelectedClientId}">

<script>
  document.addEventListener('DOMContentLoaded', function() {
      const preSelectedServiceId = document.getElementById('preSelectedServiceId')?.value;
      const preSelectedDoctorId = document.getElementById('preSelectedDoctorId')?.value;

      if (preSelectedDoctorId && preSelectedDoctorId !== '') {
          const doctorFilter = document.getElementById('doctorFilter');
          if (doctorFilter) {
              doctorFilter.value = preSelectedDoctorId;
              doctorFilter.dispatchEvent(new Event('change'));
          }
      }

      if (preSelectedServiceId && preSelectedServiceId !== '') {
          setTimeout(() => {
              const serviceCard = document.querySelector(`.service-card[data-service-id="${preSelectedServiceId}"]`);
              if (serviceCard) {
                  const selectBtn = serviceCard.querySelector('.btn-select-service');
                  if (selectBtn) {
                      selectBtn.click();
                  }
              }
          }, 500);
      }
  });
</script>

<script src="/js/booking.js"></script>
</body>
</html>
